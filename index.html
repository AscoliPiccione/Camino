<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Officine Grande Coniglio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Playfair+Display:ital,wght@0,600;1,600&display=swap');

        body {
            background: radial-gradient(circle, #444, #111);
            background-image: url('https://www.transparenttextures.com/patterns/dark-brick-wall.png');
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
            margin: 0;
            font-family: 'Playfair Display', serif;
            overflow-x: hidden;
        }

        .brass-plate {
            background: linear-gradient(135deg, #b58d3e 0%, #7a5c1d 45%, #b58d3e 55%, #5e4513 100%);
            border: 6px solid #4a3810;
            border-radius: 30px;
            box-shadow: 0 0 0 4px #222, 10px 10px 30px rgba(0,0,0,0.8), inset 2px 2px 5px rgba(255,255,255,0.3);
            padding: 2rem 1.5rem;
            max-width: 800px;
            width: 100%;
            position: relative;
            text-align: center;
        }

        @media (min-width: 640px) {
            .brass-plate { padding: 3rem; border: 8px solid #4a3810; border-radius: 40px; }
        }

        .header-title {
            font-family: 'Cinzel', serif;
            font-size: 1.5rem;
            color: #2a1f0a;
            text-shadow: 1px 1px 0px rgba(255,255,255,0.2);
            margin-bottom: 1.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            animation: flicker 3s infinite alternate;
        }

        .bell-grid { display: grid; grid-template-columns: 1fr; gap: 1rem; }
        @media (min-width: 640px) { .bell-grid { grid-template-columns: repeat(2, 1fr); gap: 1.5rem; } }

        .bell-item {
            display: flex; align-items: center; background: rgba(0, 0, 0, 0.15);
            padding: 0.6rem 0.8rem; border-radius: 10px; border-bottom: 2px solid rgba(255,255,255,0.1);
            border-top: 2px solid rgba(0,0,0,0.3); transition: all 0.2s;
            text-decoration: none; cursor: pointer; -webkit-tap-highlight-color: transparent;
        }

        .label-space {
            flex-grow: 1; text-align: left; background: #fdf6e3; padding: 0.2rem 0.6rem;
            border: 1px inset #888; font-size: 0.95rem; color: #333; font-weight: bold;
            box-shadow: inset 1px 1px 3px rgba(0,0,0,0.2); white-space: nowrap;
            overflow: hidden; text-overflow: ellipsis; min-height: 1.8rem; display: flex; align-items: center;
        }

        .brass-button {
            width: 30px; height: 30px; background: radial-gradient(circle at 30% 30%, #ffd700, #b58d3e 70%, #5e4513);
            border: 2px solid #4a3810; border-radius: 50%; margin-left: 0.75rem;
            box-shadow: 2px 2px 4px rgba(0,0,0,0.5); position: relative; flex-shrink: 0;
        }

        #status-msg {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.85); color: #ffd700; padding: 8px 16px;
            border-radius: 20px; opacity: 0; transition: opacity 0.5s; pointer-events: none;
            z-index: 100; font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="brass-plate">
        <h1 class="header-title">Officine Grande Coniglio</h1>
        <div class="bell-grid" id="bellContainer"></div>
    </div>

    <div id="status-msg">In attesa...</div>

    <script>
        const bellsData = [
            { name: "Camino Navigator", link: "caminoindex.html" },
            { name: "Reparto Carote", link: "#" },
            { name: "Sviluppo Tane", link: "#" },
            { name: "Logistica Balzi", link: "#" },
            { name: "Ufficio Reclami", link: "#" },
            { name: "Archivio Storico", link: "#" },
            { name: "Manutenzione Prato", link: "#" },
            { name: "Sicurezza Volpi", link: "#" },
            { name: "Portineria", link: "#" },
            { name: "Showroom", link: "#" },
            { name: "Ricerca & Sviluppo", link: "#" },
            { name: "Amministrazione", link: "#" },
            { name: "Ufficio Stampa", link: "#" },
            { name: "Relazioni Esterne", link: "#" },
            { name: "Laboratorio Segreto", link: "#" },
            { name: "Mensa Conigli", link: "#" },
            { name: "Area Relax Paglia", link: "#" },
            { name: "Controllo Qualità", link: "#" },
            { name: "Risorse Umane", link: "#" },
            { name: "Uscita Emergenza", link: "#" }
        ];

        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playBellSound(freq, start, duration) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime + start);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime + start);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + start + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(audioCtx.currentTime + start);
            osc.stop(audioCtx.currentTime + start + duration);
        }

        function playBuzzer(duration) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(55, audioCtx.currentTime); 
            gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.12, audioCtx.currentTime + duration - 0.1);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function playVoice(text) {
            return new Promise((resolve) => {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'it-IT';
                utterance.onend = resolve;
                utterance.onerror = resolve;
                window.speechSynthesis.speak(utterance);
            });
        }

        const wait = ms => new Promise(res => setTimeout(res, ms));
        const container = document.getElementById('bellContainer');
        const statusMsg = document.getElementById('status-msg');

        bellsData.forEach((bell) => {
            const anchor = document.createElement('a');
            anchor.className = 'bell-item';
            anchor.href = "javascript:void(0)";
            anchor.innerHTML = `<div class="label-space">${bell.name}</div><div class="brass-button"></div>`;

            anchor.addEventListener('click', async () => {
                initAudio();
                
                // RESET E SBLOCCO: Diciamo subito al browser di prepararsi a parlare
                window.speechSynthesis.cancel();
                let unlock = new SpeechSynthesisUtterance("");
                window.speechSynthesis.speak(unlock);

                // 1. Suono Campanello
                statusMsg.innerText = "Suonando...";
                statusMsg.style.opacity = '1';
                playBellSound(659.25, 0, 1.2); 
                playBellSound(523.25, 0.4, 1.2);
                
                await wait(1600);
                
                // 2. Prima frase
                statusMsg.innerText = "Sì?";
                await playVoice("siii, desideraaaa?");
                
                await wait(800);
                
                // 3. Seconda frase
                statusMsg.innerText = "Le apro...";
                await playVoice("le apro subitooo");
                
                await wait(300);
                
                // 4. Ronzìo apertura
                statusMsg.innerText = "Entrate pure";
                playBuzzer(1.8);
                
                await wait(2000);
                statusMsg.style.opacity = '0';
                
                if (bell.link !== "#") {
                    window.location.href = bell.link;
                }
            });
            container.appendChild(anchor);
        });
    </script>
</body>
</html>
